<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>포스트</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
        #postTitle { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        #postContent { border: 1px solid #ddd; padding: 16px; border-radius: 6px; margin-bottom: 20px; line-height: 1.6; }
        #commentSection { margin-top: 20px; }
        #postActions button {font-size: 12px; padding: 4px 8px; }
        input { display: block; width: 100%; margin: 6px 0; padding: 8px; box-sizing: border-box; }
        button { padding: 8px 14px; cursor: pointer; margin-right: 4px; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
<h2> 포스팅 글</h2>
<div id="postTitle"></div>
<hr>
<div id="postContent"></div>
<div id="postActions" style="text-align: right; margin-top: 8px;"></div>
<hr>
<h3>댓글</h3>
<div id="commentSection"></div>
<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/index.html';
    let currentPost = null;
    let currentUsername = null;


    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    loadPostDetail()

    async function loadPostDetail() {
        const res = await fetch(`/post/${id}`, {
            headers: {'Authorization': 'Bearer ' + token}
        });

        if (res.status === 401 || res.status === 403) {
            localStorage.removeItem('token');
            window.location.href = '/index.html';
            return;
        }
        const payload = JSON.parse(atob(token.split('.')[1]));
        currentUsername = payload.sub;

        currentPost = await res.json();
        document.getElementById('postTitle').textContent = currentPost.title;
        document.getElementById('postContent').textContent = currentPost.content;

        // 작성자일 때만 버튼 표시
        if (currentUsername === currentPost.member.username){
            // 수정 삭제 버튼을 동적으로 추가
            document.getElementById('postActions').innerHTML = `
                <button onclick="editPost()">수정</button>
                <button onclick="deletePost()">삭제</button>
            `;


        }

        loadComments(id);
    }
    // post 기능 -start-
    async function deletePost(){
        await fetch(`/post/delete/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        loadPostDetail();
    }
    async function updatePost(){
        const title = document.getElementById('editTitle').value;
        const content = document.getElementById('editContent').value;

        await fetch(`/post/update/${id}` , {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ title, content })
        });
        loadPostDetail();
    }

    // post 수정버튼 생성 메서드
    function editPost() {
        document.getElementById(`postTitle`).innerHTML = `
        <input id="editTitle" value="${currentPost.title}" />`;
        document.getElementById(`postContent`).innerHTML = `
        <textarea id="editContent" rows="4">${currentPost.content}</textarea>`;
        document.getElementById(`postActions`).innerHTML = `
        <button onclick="updatePost()">저장</button>
        <button onclick="loadPostDetail()">취소</button>`;
    }
    // 댓글 기능 -start-

    async function loadComments(postId) {
        const res = await fetch('/comment/read/' + postId, {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const comments = await res.json();
        const div = document.getElementById('commentSection');

        div.innerHTML = '';
        comments.forEach(comment => {
            // 본인인지 확인 절차
            const isOwner = currentUsername === comment.member.username;
            div.innerHTML += `
                <div id="comment-item-${comment.id}">
                    <p>${comment.content} - ${comment.member.username}</p>
                    ${isOwner ? `
                    <button onclick="editComment(${comment.id}, '${comment.content}', ${postId})">수정</button>
                    <button onclick="deleteComment(${comment.id}, ${postId})">삭제</button>
                    ` : ''}
                </div>
            `;
        });
        div.innerHTML += `
            <input id="commentInput-${postId}" placeholder="댓글을 입력하세요" />
            <button onclick="writeComment(${postId})">작성</button>
        `;
    }

    async function writeComment(postId) {
        const content = document.getElementById('commentInput-' + postId).value;

        await fetch('/comment/write', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ content, postId })
        });

        await loadComments(postId);
    }

    function editComment(commentId, commentContent, postId) {
        const commentDiv = document.getElementById(`comment-item-${commentId}`);
        commentDiv.innerHTML = `
            <input id="editInput-${commentId}" value="${commentContent}" />
            <button onclick="updateComment(${commentId}, document.getElementById('editInput-${commentId}').value, ${postId})">저장</button>
            <button onclick="loadComments(${postId})">취소</button>
        `;
    }

    async function updateComment(commentId, commentContent, postId) {
        await fetch('/comment/update/' + commentId, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ content: commentContent })
        });
        await loadComments(postId);
    }

    async function deleteComment(commentId, postId) {
        await fetch('/comment/delete/' + commentId, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        await loadComments(postId);
    }
    // 댓글 기능 -end-
</script>
</body>
</html>
