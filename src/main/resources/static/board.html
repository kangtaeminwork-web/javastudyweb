<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시판</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
        input, textarea { display: block; width: 100%; margin: 6px 0; padding: 8px; box-sizing: border-box; }
        button { padding: 8px 14px; cursor: pointer; margin-right: 4px; }
        .post { border: 1px solid #ddd; padding: 12px; margin: 10px 0; border-radius: 6px; }
        .post h3 { margin: 0 0 6px; }
        #message { color: blue; margin: 8px 0; }
    </style>
</head>
<body>
<h2>📋 게시판</h2>
<button onclick="window.location.href='mypage.html'">마이페이지</button>
<button onclick="logout()">로그아웃</button>
<hr>

<h3>글 작성</h3>
<input id="title" placeholder="제목" />
<textarea id="content" placeholder="내용" rows="4"></textarea>
<button onclick="writePost()">글 올리기</button>
<div id="message"></div>

<hr>
<h3>글 목록</h3>
<div id="postList"></div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/index.html';

    loadPosts();

    function logout() {
        if (confirm("정말 로그아웃 하시겠어요?")) {
            localStorage.removeItem('token');
            window.location.href = '/index.html';
        }
    }

    async function writePost() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;

        const res = await fetch('/post/write', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ title, content })
        });

        const msg = await res.text();
        document.getElementById('message').textContent = msg;
        document.getElementById('title').value = '';
        document.getElementById('content').value = '';
        loadPosts();
    }

    async function loadPosts() {
        const res = await fetch('/post/read', {
            headers: { 'Authorization': 'Bearer ' + token }
        });

        if (res.status === 401 || res.status === 403) {
            localStorage.removeItem('token');
            window.location.href = '/index.html';
            return;
        }

        const posts = await res.json();
        const list = document.getElementById('postList');
        list.innerHTML = '';

        posts.forEach(post => {
            list.innerHTML += `
                <div class="post" id="post-${post.id}">
                    <a href="post.html?id=${post.id}">${post.title}</a>
                </div>
            `;
        });
    }




</script>
</body>
</html>
